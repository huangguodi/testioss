name: ios-unsigned-ipa

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod --version
          gem install xcpretty

      - name: Prepare Project
        run: |
          if [ ! -d "ios_project" ]; then
            echo "ERROR: ios_project 不存在。请将 iOS 工程拷贝到仓库根目录的 ios_project/ 下，并包含 Podfile 与 YBLiveOne.xcworkspace 或 Xcodeproj。"
            exit 1
          fi
      # 跳过 pod install，完全使用已提交的本地 Pods
      # 依赖已通过 Git LFS 提交，无需再进行 unzip 和注入操作

      - name: Verify LFS Objects
        run: |
          set -e
          echo "Checking IJKMediaFramework..."
          ls -l ios_project/Pods/IJKMediaFramework/IJKMediaFramework/Classes/IJKMediaFramework.framework/IJKMediaFramework || echo "IJK binary missing!"
          echo "Checking TXLiteAVSDK..."
          ls -l ios_project/Pods/TXLiteAVSDK_Professional/TXLiteAVSDK_Professional/TXLiteAVSDK_Professional.framework/TXLiteAVSDK_Professional || echo "TX binary missing!"
      - name: Pre-Build Diagnostics
        working-directory: ios_project
        run: |
          set -e
          echo "=== iOS Project Structure ==="
          ls -R . | head -n 20 || true
          echo "=== Podfile Content ==="
          cat Podfile || true
          echo "=== SDKs ==="
          xcodebuild -showsdks || true

      - name: Build (No Code Signing)
        working-directory: ios_project
        run: |
          set -e
          # Function to extract schemes
          pick_scheme() {
            LIST_CMD="$1"
            SCHEMES=$($LIST_CMD | awk '/Schemes:/{p=1;next} p && NF' | sed 's/^[ \t]*//;s/[ \t]*$//')
            # Prefer YBLiveOne if present
            if echo "$SCHEMES" | grep -Fxq "YBLiveOne"; then
              echo "YBLiveOne"
              return
            fi
            # Fallback to first non-empty line
            echo "$SCHEMES" | head -n 1
          }

          # Common Build Args for Unsigned Build
          # Use -derivedDataPath to strictly control output location
          BUILD_ARGS_COMMON="-configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGNING_IDENTITY=\"\" PROVISIONING_PROFILE_SPECIFIER=\"\" ENABLE_BITCODE=NO"
          BUILD_ARGS_SCHEME="$BUILD_ARGS_COMMON -derivedDataPath build"
          
          BUILD_OK=0
          APP_PATH_FROM_SETTINGS=""

          # 1. Try Workspace Scheme
          if [ -d "YBLiveOne.xcworkspace" ]; then
            SELECTED_SCHEME=$(pick_scheme "xcodebuild -list -workspace YBLiveOne.xcworkspace")
            echo "Selected workspace scheme: '${SELECTED_SCHEME}'"
            if [ -n "$SELECTED_SCHEME" ]; then
              if xcodebuild -workspace YBLiveOne.xcworkspace -scheme "$SELECTED_SCHEME" build $BUILD_ARGS_SCHEME ; then
                BUILD_OK=1
                APP_PATH_FROM_SETTINGS="build/Build/Products/Release-iphoneos/YBLiveOne.app"
              else
                echo "Workspace build failed."
              fi
            fi
          fi

          # 2. Try Project Scheme (if workspace failed or not found)
          if [ "$BUILD_OK" -ne 1 ] && [ -d "YBLiveOne.xcodeproj" ]; then
            SELECTED_SCHEME=$(pick_scheme "xcodebuild -list -project YBLiveOne.xcodeproj")
            echo "Selected project scheme: '${SELECTED_SCHEME}'"
            if [ -n "$SELECTED_SCHEME" ]; then
              if xcodebuild -project YBLiveOne.xcodeproj -scheme "$SELECTED_SCHEME" build $BUILD_ARGS_SCHEME ; then
                BUILD_OK=1
                APP_PATH_FROM_SETTINGS="build/Build/Products/Release-iphoneos/YBLiveOne.app"
              else
                echo "Project scheme build failed."
              fi
            fi
          fi

          # 3. Try Target Build (Fallback)
          if [ "$BUILD_OK" -ne 1 ] && [ -d "YBLiveOne.xcodeproj" ]; then
            echo "Attempting direct target build..."
            # Note: For target builds, -derivedDataPath requires a scheme in recent Xcode, so we use CONFIGURATION_BUILD_DIR as fallback
            if xcodebuild -project YBLiveOne.xcodeproj -target YBLiveOne build $BUILD_ARGS_COMMON CONFIGURATION_BUILD_DIR=build/Build/Products/Release-iphoneos ; then
              BUILD_OK=1
              APP_PATH_FROM_SETTINGS="build/Build/Products/Release-iphoneos/YBLiveOne.app"
            else
              echo "Target build failed."
            fi
          fi

          # 4. Final Fallback: Project-wide Build (no scheme/target specified)
          if [ "$BUILD_OK" -ne 1 ] && [ -d "YBLiveOne.xcodeproj" ]; then
             echo "Attempting generic project build..."
             if xcodebuild -project YBLiveOne.xcodeproj build $BUILD_ARGS_COMMON CONFIGURATION_BUILD_DIR=build/Build/Products/Release-iphoneos ; then
               BUILD_OK=1
               APP_PATH_FROM_SETTINGS="build/Build/Products/Release-iphoneos/YBLiveOne.app"
             fi
          fi
          
          if [ "$BUILD_OK" -ne 1 ]; then
            echo "::error::All build attempts failed."
            exit 1
          fi
          
          echo "=== Built Products at build/Build/Products/Release-iphoneos ==="
          ls -al build/Build/Products/Release-iphoneos || true
          
          if [ -n "$APP_PATH_FROM_SETTINGS" ]; then
            echo "APP_PATH_FROM_SETTINGS=$APP_PATH_FROM_SETTINGS" >> $GITHUB_ENV
            echo "Computed APP_PATH_FROM_SETTINGS: $APP_PATH_FROM_SETTINGS"
          fi

      - name: Package Unsigned IPA
        working-directory: ios_project
        run: |
          set -e
          if [ -n "${APP_PATH_FROM_SETTINGS}" ] && [ -d "${APP_PATH_FROM_SETTINGS}" ]; then
            APP_PATH="${APP_PATH_FROM_SETTINGS}"
          else
            APP_DIR="build/Build/Products/Release-iphoneos"
            APP_PATH=""
            if [ -d "$APP_DIR" ]; then
              APP_PATH=$(find "$APP_DIR" -maxdepth 1 -type d -name "*.app" | head -n 1)
            fi
            if [ -z "$APP_PATH" ]; then
              APP_PATH=$(find . -type d -name "*.app" -path "*Build/Products/Release-iphoneos*" | head -n 1)
            fi
          fi
          echo "Detected APP_PATH: ${APP_PATH}"
          if [ -z "$APP_PATH" ]; then
            echo "未找到构建产物"
            echo "=== Release-iphoneos Contents (if any) ==="
            if [ -d "$APP_DIR" ]; then
              ls -al "$APP_DIR" || true
            fi
            echo "=== All .app under Build/Products/Release-iphoneos ==="
            find . -type d -name '*.app' -path '*Build/Products/Release-iphoneos*' -print || true
            exit 1
          fi
          
          # Verify App Content
          echo "=== Verifying App Content: $APP_PATH ==="
          ls -R "$APP_PATH" | head -n 20
          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App Size: $APP_SIZE"
          
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" "Payload/YBLiveOne.app"
          zip -r "YBLiveOne-unsigned.ipa" Payload
          echo "IPA generated at ios_project/YBLiveOne-unsigned.ipa"
          ls -al ios_project/YBLiveOne-unsigned.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ios_project/YBLiveOne-unsigned.ipa
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Latest Release (for non-tag builds)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/')
        with:
          files: ios_project/YBLiveOne-unsigned.ipa
          tag_name: "nightly-build"
          name: "Nightly Build (Latest)"
          body: "Latest unsigned IPA build from main branch."
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
